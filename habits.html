<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker - Focus Série</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --main-color: #5c67f2; 
            --success-color: #28a745; 
            --flame-color: #ff5722; 
            --bg-color: #f4f7f9; 
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); margin: 0; padding: 30px; color: #333; }
        
        .layout { display: flex; gap: 30px; max-width: 1300px; margin: 0 auto; align-items: flex-start; }
        
        /* SECTION GAUCHE : SÉRIE AGRANDIE */
        .streak-panel { flex: 0 0 320px; }
        .streak-card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center;
            border: 1px solid rgba(255, 87, 34, 0.1);
        }
        .flame-container { 
            font-size: 110px; 
            position: relative; 
            display: inline-block; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 10px 15px rgba(255, 87, 34, 0.3));
            animation: flameFloat 2s infinite ease-in-out;
        }
        .streak-number { 
            position: absolute; 
            top: 65%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 38px; 
            font-weight: 900; 
            color: white; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .streak-label { 
            font-weight: 800; 
            color: #444; 
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .record-box { 
            margin-top: 25px; 
            font-size: 15px; 
            color: #666; 
            background: #fff5f2;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* SECTION CENTRE : LISTE */
        .main-content { flex: 1; background: white; padding: 35px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        .input-group { display: flex; gap: 12px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 15px; border: 2px solid #edf2f7; border-radius: 15px; outline: none; font-size: 16px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--main-color); background: #fcfcff; }
        .btn-add { background: var(--main-color); color: white; border: none; width: 50px; border-radius: 15px; cursor: pointer; font-size: 24px; transition: 0.2s; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(92, 103, 242, 0.4); }

        .habit-item { display: flex; align-items: center; padding: 18px; border-radius: 18px; margin-bottom: 12px; background: #f8fafc; border: 1px solid transparent; transition: 0.3s; }
        .habit-item.complete { background-color: #f0fff4; border-color: #c6f6d5; }
        .habit-item input { transform: scale(1.6); margin-right: 20px; accent-color: var(--success-color); }
        .habit-item span { font-size: 17px; font-weight: 500; }
        .delete-btn { color: #cbd5e0; cursor: pointer; margin-left: auto; font-size: 20px; transition: 0.2s; }
        .delete-btn:hover { color: #e53e3e; }

        /* SECTION DROITE */
        .sidebar { flex: 0 0 280px; display: flex; flex-direction: column; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; background: #f1f5f9; color: #64748b; font-weight: 600; }
        .day-box.perfect { background: var(--success-color) !important; color: white; }
        .day-box.today { box-shadow: 0 0 0 3px var(--main-color) inset; }

        @keyframes flameFloat { 
            0%, 100% { transform: translateY(0) scale(1); } 
            50% { transform: translateY(-10px) scale(1.05); } 
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="streak-panel">
        <div class="streak-card">
            <div class="flame-container">
                🔥
                <div id="currentStreak" class="streak-number">0</div>
            </div>
            <div class="streak-label">Série Actuelle</div>
            <div class="record-box">
                <span>🏆</span> Record : <strong id="maxStreak">0</strong> jours
            </div>
        </div>
    </div>

    <div class="main-content">
        <h2>Mes Objectifs</h2>
        <div class="input-group">
            <input type="text" id="habitInput" placeholder="Ex: Faire 20 pompes...">
            <button class="btn-add" onclick="addHabit()">+</button>
        </div>
        <div id="habitList"></div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h3 id="monthName" style="margin:0; text-align:center; font-size: 16px; color: #444;"></h3>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="card" style="text-align: center;">
            <h3 style="margin:0 0 15px 0; font-size: 15px;">Discipline Mensuelle</h3>
            <canvas id="myChart" width="160" height="160"></canvas>
            <div id="globalPercent" style="font-size: 24px; font-weight: 800; color: var(--main-color); margin-top: 15px;">0%</div>
        </div>
    </div>
</div>

<script>
    let habits = JSON.parse(localStorage.getItem('habits')) || [];
    let history = JSON.parse(localStorage.getItem('habitHistory')) || {}; 
    let myChart;
    const todayKey = new Date().toISOString().split('T')[0];

    function addHabit() {
        const input = document.getElementById('habitInput');
        if (!input.value.trim()) return;
        habits.push({ id: Date.now(), text: input.value, done: false });
        input.value = "";
        saveAndRender();
    }

    function toggleHabit(id) {
        habits = habits.map(h => h.id === id ? {...h, done: !h.done} : h);
        updateHistory();
        saveAndRender();
    }

    function deleteHabit(id) {
        habits = habits.filter(h => h.id !== id);
        updateHistory();
        saveAndRender();
    }

    function updateHistory() {
        const allDone = habits.length > 0 && habits.every(h => h.done);
        if (allDone) { history[todayKey] = true; } 
        else { delete history[todayKey]; }
    }

    function calculateStreaks() {
        let current = 0;
        let max = 0;
        let tempStreak = 0;
        
        let checkDate = new Date();
        if (!history[todayKey]) { checkDate.setDate(checkDate.getDate() - 1); }

        while (history[checkDate.toISOString().split('T')[0]]) {
            current++;
            checkDate.setDate(checkDate.getDate() - 1);
        }

        let dates = Object.keys(history).sort();
        if (dates.length > 0) {
            let lastDate = null;
            dates.forEach(dateStr => {
                let d = new Date(dateStr);
                if (lastDate) {
                    let diff = (d - lastDate) / (1000 * 60 * 60 * 24);
                    if (diff === 1) { tempStreak++; } 
                    else { tempStreak = 1; }
                } else { tempStreak = 1; }
                if (tempStreak > max) max = tempStreak;
                lastDate = d;
            });
        }
        document.getElementById('currentStreak').innerText = current;
        document.getElementById('maxStreak').innerText = max;
    }

    function saveAndRender() {
        localStorage.setItem('habits', JSON.stringify(habits));
        localStorage.setItem('habitHistory', JSON.stringify(history));
        renderList();
        renderCalendar();
        updateChart();
        calculateStreaks();
    }

    function renderList() {
        const list = document.getElementById('habitList');
        list.innerHTML = "";
        habits.forEach(h => {
            const div = document.createElement('div');
            div.className = `habit-item ${h.done ? 'complete' : ''}`;
            div.innerHTML = `
                <input type="checkbox" ${h.done ? 'checked' : ''} onchange="toggleHabit(${h.id})">
                <span style="flex:1">${h.text}</span>
                <span class="delete-btn" onclick="deleteHabit(${h.id})">🗑️</span>
            `;
            list.appendChild(div);
        });
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const now = new Date();
        document.getElementById('monthName').innerText = now.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day-box' + (history[dateStr] ? ' perfect' : '') + (dateStr === todayKey ? ' today' : '');
            dayDiv.innerText = i;
            grid.appendChild(dayDiv);
        }
    }

    function updateChart() {
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const currentMonthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const perfectDays = Object.keys(history).filter(k => k.startsWith(currentMonthPrefix)).length;
        const percent = Math.round((perfectDays / daysInMonth) * 100);
        document.getElementById('globalPercent').innerText = percent + "%";

        if (myChart) myChart.destroy();
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [perfectDays, daysInMonth - perfectDays], backgroundColor: ['#28a745', '#f1f5f9'], borderWidth: 0 }] },
            options: { cutout: '85%', plugins: { legend: { display: false } } }
        });
    }

    saveAndRender();
</script>

</body>
</html>
